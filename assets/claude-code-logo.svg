<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Anthropic-style asterisk mark -->
  <g transform="translate(40,40)">
    <!-- 6 arms -->
    <rect x="-4" y="-22" width="8" height="22" rx="4" fill="#D4A853" transform="rotate(0)"/>
    <rect x="-4" y="-22" width="8" height="22" rx="4" fill="#D4A853" transform="rotate(60)"/>
    <rect x="-4" y="-22" width="8" height="22" rx="4" fill="#D4A853" transform="rotate(120)"/>
    <rect x="-4" y="-22" width="8" height="22" rx="4" fill="#D4A853" transform="rotate(180)"/>
    <rect x="-4" y="-22" width="8" height="22" rx="4" fill="#D4A853" transform="rotate(240)"/>
    <rect x="-4" y="-22" width="8" height="22" rx="4" fill="#D4A853" transform="rotate(300)"/>
  </g>
</svg>
